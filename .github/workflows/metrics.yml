name: ⚡ Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    name: Generate Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1 · BASE — languages + repos + commits
      # ─────────────────────────────────────────────
      - name: 🧬 Base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/base.svg
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Asia/Karachi
          config_display: large
          config_padding: 0, 8

      # ─────────────────────────────────────────────
      # 2 · LANGUAGES — with recent activity detail
      # ─────────────────────────────────────────────
      - name: 🌐 Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 3 · ISOMETRIC CALENDAR
      # ─────────────────────────────────────────────
      - name: 📅 Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 4 · ACHIEVEMENTS
      # ─────────────────────────────────────────────
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 5 · ACTIVITY — recent commit log
      # ─────────────────────────────────────────────
      - name: ⚙️ Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/activity.svg
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 7
          plugin_activity_days: 14
          plugin_activity_filter: all
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 6 · STARRED TOPICS
      # ─────────────────────────────────────────────
      - name: 🔖 Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/topics.svg
          base: ""
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 7 · NOTABLE CONTRIBUTIONS
      # ─────────────────────────────────────────────
      - name: 🌟 Notable contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/notable.svg
          base: ""
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 8 · LINES OF CODE CHANGED
      # ─────────────────────────────────────────────
      - name: 👨‍💻 Lines of code
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/lines.svg
          base: repositories
          plugin_lines: yes
          plugin_lines_skipped: ""
          config_timezone: Asia/Karachi
