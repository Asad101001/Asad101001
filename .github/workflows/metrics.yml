name: ⚡ Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    name: Generate Metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ─────────────────────────────────────────────
      # 1 · BASE — header + activity + community + repos
      # ─────────────────────────────────────────────
      - name: 🧬 Base metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/base.svg
          base: header, activity, community, repositories
          base_indepth: yes
          config_timezone: Asia/Karachi
          config_display: large
          config_padding: 0, 8

      # ─────────────────────────────────────────────
      # 2 · LANGUAGES — indepth via git clone
      # ─────────────────────────────────────────────
      - name: 🌐 Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 8
          plugin_languages_threshold: 0%
          plugin_languages_analysis_timeout: 30
          plugin_languages_categories: markup, programming
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 14
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 3 · ISOMETRIC CALENDAR
      # ─────────────────────────────────────────────
      - name: 📅 Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/isocalendar.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 4 · ACHIEVEMENTS
      #     Requires: gist scope on token
      # ─────────────────────────────────────────────
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 5 · ACTIVITY — recent commit log
      #     Requires: gist scope on token
      # ─────────────────────────────────────────────
      - name: ⚙️ Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/activity.svg
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 7
          plugin_activity_days: 30
          plugin_activity_filter: push, issue, pr, release, review, ref/create
          config_timezone: Asia/Karachi

      # ─────────────────────────────────────────────
      # 6 · LINES OF CODE
      #     Standalone — base: repositories only
      # ─────────────────────────────────────────────
      - name: 👨‍💻 Lines of code
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics/lines.svg
          base: ""
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          config_timezone: Asia/Karachi
